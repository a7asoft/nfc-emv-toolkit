name: Feature request
description: Propose a new capability
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API
      description: Sketch the public surface in Kotlin and/or Swift.
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This stays within "read-only contactless EMV" (no kernel cert, no online auth, no ARQC verification, no contact reading).
          required: true
