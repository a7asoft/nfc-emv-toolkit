name: Dokka

# Publishes the :shared module's API docs to GitHub Pages on every
# semantic-version tag push, and on manual workflow_dispatch (e.g.
# for a one-time site bootstrap before the first tag exists).

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one in-flight Pages deploy per workflow; queue the rest.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Generate + deploy Dokka HTML
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
      - name: Generate Dokka HTML
        run: ./gradlew :shared:dokkaGeneratePublicationHtml --stacktrace
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/api/kotlin
      - id: deployment
        uses: actions/deploy-pages@v5
