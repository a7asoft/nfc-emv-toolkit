name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kmp:
    name: KMP build & test
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Build shared (all targets)
        run: ./gradlew :shared:build --stacktrace
      - name: Run common tests
        run: ./gradlew :shared:allTests --stacktrace
      - name: Build Android sample
        run: ./gradlew :composeApp:assembleDebug --stacktrace

  ios:
    name: iOS build
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Build iOS framework
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64
      - name: Build iOS sample app
        run: |
          xcodebuild -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            build | xcpretty || exit ${PIPESTATUS[0]}
